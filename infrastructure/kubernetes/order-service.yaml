---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: order-service
  namespace: microservices
  labels:
    app: order-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: order-service
  template:
    metadata:
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "5002"
      labels:
        app: order-service
    spec:
      imagePullSecrets:
        - name: ghcr-secret
      containers:
        - name: order-service
          image: ghcr.io/asutaka/order-service:latest
          ports:
            - containerPort: 5002
            - containerPort: 5102
          env:
            - name: ASPNETCORE_ENVIRONMENT
              value: Production
            - name: RabbitMQ__Host
              valueFrom:
                configMapKeyRef:
                  key: rabbitmq-host
            - name: JAEGER_HOST
              valueFrom:
                configMapKeyRef:
                  name: microservices-config
                  key: JAEGER_HOST
            - name: GrpcClients__UserService
              value: "http://user-service:5101"
            - name: ConnectionStrings__OrderDb
              valueFrom:
                secretKeyRef:
                  name: db-secrets
                  key: order-db-connection
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "500m"
          readinessProbe:
            httpGet:
              path: /health
              port: 5002
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 5002
            initialDelaySeconds: 30
            periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: order-service
  namespace: microservices
spec:
  selector:
    app: order-service
  ports:
    - name: http
      port: 5002
      targetPort: 5002
    - name: grpc
      port: 5102
      targetPort: 5102
  type: ClusterIP
