apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: test-microservices
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://github.com/YOUR-USERNAME/YOUR-REPO-NAME.git'  # TODO: Edit this to your GitHub repo URL
    targetRevision: HEAD
    path: infrastructure/kubernetes
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: microservices
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
