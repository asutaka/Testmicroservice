<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Microservices - Traffic Generator</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #4f46e5;
            --secondary: #06b6d4;
            --bg: #0f172a;
            --card: rgba(30, 41, 59, 0.7);
            --text: #f8fafc;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Outfit', sans-serif;
            background: radial-gradient(circle at top right, #1e1b4b, var(--bg));
            color: var(--text);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 800px;
            background: var(--card);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 40px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            background: linear-gradient(to right, #818cf8, #22d3ee);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-align: center;
        }

        p.subtitle {
            text-align: center;
            color: #94a3b8;
            margin-bottom: 40px;
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 30px;
        }

        .card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            padding: 25px;
            border-radius: 20px;
            transition: transform 0.3s ease;
        }

        .card:hover {
            transform: translateY(-5px);
            background: rgba(255, 255, 255, 0.05);
        }

        h2 { font-size: 1.2rem; margin-bottom: 15px; color: #cbd5e1; }

        button {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }

        .btn-user { background: linear-gradient(135deg, #6366f1, #4f46e5); color: white; }
        .btn-order { background: linear-gradient(135deg, #06b6d4, #0891b2); color: white; }
        
        button:hover { filter: brightness(1.2); transform: scale(1.02); }
        button:active { transform: scale(0.98); }

        .log-container {
            margin-top: 30px;
            background: #020617;
            border-radius: 16px;
            padding: 20px;
            height: 250px;
            overflow-y: auto;
            font-family: 'Consolas', monospace;
            font-size: 0.9rem;
            border: 1px solid #1e293b;
        }

        .log-entry {
            margin-bottom: 8px;
            padding-bottom: 8px;
            border-bottom: 1px solid #1e293b;
            display: flex;
            gap: 10px;
        }

        .time { color: #64748b; }
        .method { font-weight: bold; }
        .status-ok { color: #22c55e; }
        .status-error { color: #ef4444; }
        .msg { color: #e2e8f0; }

    </style>
</head>
<body>

    <div class="container">
        <h1>Traffic Generator</h1>
        <p class="subtitle">Tự động hóa nạp dữ liệu ảo vào Microservices System</p>

        <div class="grid">
            <div class="card">
                <h2>User Management</h2>
                <button class="btn-user" onclick="postRandomUser()">
                    <span>👤</span> Nạp 1 User Ngẫu Nhiên
                </button>
                <div style="margin-top: 10px; font-size: 0.8rem; color: #64748b;">Dữ liệu sẽ được đẩy vào /api/users</div>
            </div>
            <div class="card">
                <h2>Order Processing</h2>
                <button class="btn-order" onclick="postRandomOrder()" disabled style="opacity: 0.5; cursor: not-allowed;">
                    <span>🛒</span> (Sắp ra mắt)
                </button>
                <div style="margin-top: 10px; font-size: 0.8rem; color: #64748b;">Dữ liệu sẽ được đẩy vào /api/orders</div>
            </div>
        </div>

        <div class="log-container" id="terminal">
            <div class="log-entry">
                <span class="time">></span>
                <span class="msg">Hệ thống sẵn sàng. Đang chờ lệnh... (Đảm bảo đã port-forward cổng 5000)</span>
            </div>
        </div>
    </div>

    <script>
        const API_URL = 'http://localhost:5000/api/users';
        const logEl = document.getElementById('terminal');

        function addLog(method, msg, status = 'ok') {
            const time = new Date().toLocaleTimeString();
            const entry = document.createElement('div');
            entry.className = 'log-entry';
            entry.innerHTML = `
                <span class="time">[${time}]</span>
                <span class="method" style="color: ${method === 'POST' ? '#818cf8' : '#fbbf24'}">${method}</span>
                <span class="status-${status === 'ok' ? 'ok' : 'error'}">${status.toUpperCase()}</span>
                <span class="msg">${msg}</span>
            `;
            logEl.prepend(entry);
        }

        async function postRandomUser() {
            const firstNames = ['Anh', 'Binh', 'Chien', 'Dung', 'Giang', 'Hanh', 'Khoa', 'Linh'];
            const lastNames = ['Nguyen', 'Tran', 'Le', 'Pham', 'Hoang', 'Vu', 'Dang'];
            
            const fName = firstNames[Math.floor(Math.random() * firstNames.length)];
            const lName = lastNames[Math.floor(Math.random() * lastNames.length)];
            const randomEmail = `${fName.toLowerCase()}.${Date.now()}@test.com`;

            const payload = {
                firstName: fName,
                lastName: lName,
                email: randomEmail,
                password: "Password123!",
                role: 0
            };

            try {
                addLog('POST', `Đang gửi User: ${fName} ${lName}...`);
                
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                if (response.ok) {
                    const data = await response.json();
                    addLog('POST', `Thành công! ID: ${data.id || 'N/A'}`, 'ok');
                } else {
                    const errorMsg = await response.text();
                    addLog('POST', `Lỗi: ${response.status} - ${errorMsg}`, 'error');
                }
            } catch (err) {
                addLog('POST', `Không kết nối được Gateway: ${err.message}`, 'error');
            }
        }
    </script>
</body>
</html>
